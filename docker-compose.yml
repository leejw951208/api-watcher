services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
            args:
                APP: user
        container_name: api-watcher-user
        ports:
            - '4000:4000'
        environment:
            - NODE_ENV=local
        env_file:
            - ./envs/.env.local
            - ./apps/user/envs/.env.local
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/v1/health']
            interval: 30s
            timeout: 3s
            start_period: 40s
            retries: 3
        restart: unless-stopped
        command: ['node', 'dist/apps/user/main.js']
        networks:
            - app-network
    admin:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
            args:
                APP: admin
        container_name: api-watcher-admin
        ports:
            - '4001:4000'
        environment:
            - NODE_ENV=local
        env_file:
            - ./envs/.env.local
            - ./apps/admin/envs/.env.local
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:4001/admin/v1/health']
            interval: 30s
            timeout: 3s
            start_period: 40s
            retries: 3
        restart: unless-stopped
        command: ['node', 'dist/apps/admin/main.js']
        networks:
            - app-network
    db:
        image: postgres:15-alpine
        container_name: api-watcher-db
        environment:
            - POSTGRES_DB=api-watcher
            - POSTGRES_PASSWORD=postgres
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
            - app-network

volumes:
    postgres_data:

networks:
    app-network:
        driver: bridge
